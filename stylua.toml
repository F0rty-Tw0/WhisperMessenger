# StyLua configuration for WhisperMessenger
# WoW uses Lua 5.1 — pin syntax explicitly
syntax = "Lua51"
column_width = 120
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
space_after_function_names = "Never"
collapse_simple_statement = "Never"

[sort_requires]
enabled = false
