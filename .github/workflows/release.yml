name: Package and release

on:
  push:
    tags:
      - "**"

  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - beta
          - alpha
        default: release

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1

  release:
    needs: lint
    runs-on: ubuntu-latest

    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version, update TOCs, tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ inputs.version }}"
          NORMALIZED_VERSION="${INPUT_VERSION#v}"
          TAG_VERSION="v${NORMALIZED_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet "refs/tags/${TAG_VERSION}"; then
            echo "Tag ${TAG_VERSION} already exists; nothing to do."
            exit 0
          fi

          # Single source of truth for the version + TOC bump.
          bash scripts/release.sh "$INPUT_VERSION"

          # scripts/release.sh creates the commit + annotated tag locally;
          # push both so the package step picks up the tag.
          git push origin HEAD:master
          git push origin "${TAG_VERSION}"

      - name: Package and release
        uses: BigWigsMods/packager@v2
