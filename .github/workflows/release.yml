name: Package and release

on:
  push:
    tags:
      - "**"

  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - beta
          - alpha
        default: release

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1

  release:
    needs: lint
    runs-on: ubuntu-latest

    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^## Version: .*/## Version: ${VERSION}/" WhisperMessenger.toc
          sed -i "s/VERSION = \"[^\"]*\"/VERSION = \"${VERSION}\"/" Core/Constants.lua
          git add WhisperMessenger.toc Core/Constants.lua
          git commit -m "release: v${VERSION}"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin HEAD:master "${VERSION}"

      - name: Package and release
        uses: BigWigsMods/packager@v2
