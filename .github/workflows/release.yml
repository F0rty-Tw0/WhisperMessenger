name: Package and release

on:
  push:
    tags:
      - "**"

  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - beta
          - alpha
        default: release

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1

  release:
    needs: lint
    runs-on: ubuntu-latest

    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [[ ! "$INPUT_VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$INPUT_VERSION'. Expected 1.0.0 or v1.0.0"
            exit 1
          fi
          NORMALIZED_VERSION="${INPUT_VERSION#v}"
          TAG_VERSION="v${NORMALIZED_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^## Version: .*/## Version: ${TAG_VERSION}/" WhisperMessenger.toc
          sed -i "s/VERSION = \"[^\"]*\"/VERSION = \"${TAG_VERSION}\"/" Core/Constants.lua
          git add WhisperMessenger.toc Core/Constants.lua
          if git diff --cached --quiet; then
            echo "Version already set to ${TAG_VERSION}, skipping commit"
          else
            git commit -m "release: ${TAG_VERSION}"
            git push origin HEAD:master
          fi
          if git show-ref --verify --quiet "refs/tags/${TAG_VERSION}"; then
            echo "Tag ${TAG_VERSION} already exists, skipping tag creation"
          else
            git tag -a "${TAG_VERSION}" -m "Release ${TAG_VERSION}"
            git push origin "${TAG_VERSION}"
          fi

      - name: Package and release
        uses: BigWigsMods/packager@v2
